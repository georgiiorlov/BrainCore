<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ course.title }} — BrainCore</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #111;
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin: 8px 0;
        }

        .block {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            opacity: 0.7;
        }

        a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>{{ course.title }}</h1>

    <p><b>Описание курса:</b></p>
    <p>{{ course.description }}</p>

    <div class="block">
        <h3>Преподаватель</h3>
        {% if teacher %}
            <p><b>Имя:</b> {{ teacher.name }} {{ teacher.surname }}</p>
            <p><b>Email:</b> {{ teacher.email }}</p>
            <p><b>Телефон:</b> {{ teacher.phone }}</p>
        {% else %}
            <p>Преподаватель не указан</p>
        {% endif %}
    </div>

    <a href="/profile">← Назад в профиль</a>
</div>

</body>
</html>
